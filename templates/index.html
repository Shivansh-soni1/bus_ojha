<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Travel - India</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🇮🇳 SmartTravel AI</span>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Logout ({{ user.username }})</a>
        </div>
    </nav>
    <div id="loading-overlay">
        <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;"></div>
        <div class="loading-text">Analyzing All-India Transit Networks...</div>
    </div>
    <div class="container">
        <div class="card p-5 shadow-lg border-0">
            <h2 class="text-center mb-4">Plan Your Journey</h2>
            <form action="/search" method="POST" id="searchForm">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">From</label>
                        <input type="text" name="source" class="form-control form-control-lg" placeholder="Any City or Town" required autocomplete="off">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">To</label>
                        <input type="text" name="destination" class="form-control form-control-lg" placeholder="Any City or Town" required autocomplete="off">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-bold">Date</label>
                        <input type="date" name="date" class="form-control form-control-lg" required>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary btn-lg w-100">Search</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
