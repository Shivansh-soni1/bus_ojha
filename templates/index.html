<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smart Travel - India</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🇮🇳 SmartTravel AI</span>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Logout ({{ user.username }})</a>
        </div>
    </nav>
    <div id="loading-overlay">
        <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;"></div>
        <div class="loading-text">Analyzing All-India Transit Networks...</div>
    </div>
    <div class="container">
        <div class="card p-5 shadow-lg border-0">
            <h2 class="text-center mb-4">Plan Your Journey</h2>
            <form action="/search" method="POST" id="searchForm">
                <div class="row g-3">
                    <div class="col-md-3 position-relative">
                        <label class="form-label fw-bold">From</label>
                        <input type="text" name="source" class="form-control form-control-lg"
                            placeholder="Any City or Town" required autocomplete="off" id="source-input">
                        <input type="hidden" name="source_lat" id="source-lat">
                        <input type="hidden" name="source_lon" id="source-lon">
                        <ul class="autocomplete-list" id="source-autocomplete"></ul>
                    </div>
                    <div class="col-md-3 position-relative">
                        <label class="form-label fw-bold">To</label>
                        <input type="text" name="destination" class="form-control form-control-lg"
                            placeholder="Any City or Town" required autocomplete="off" id="dest-input">
                        <input type="hidden" name="dest_lat" id="dest-lat">
                        <input type="hidden" name="dest_lon" id="dest-lon">
                        <ul class="autocomplete-list" id="dest-autocomplete"></ul>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-bold">Date</label>
                        <input type="date" name="date" class="form-control form-control-lg" required>
                        <div class="form-check mt-2">
                            <input class="form-check-input" type="checkbox" name="flexible_date" id="flexDate" value="true">
                            <label class="form-check-label small" for="flexDate">Flexible Dates</label>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-bold">Priority</label>
                        <select name="priority" class="form-select form-select-lg">
                            <option value="balanced" selected>Balanced </option>
                            <option value="cheapest">Cheapest</option>
                            <option value="fastest">Fastest</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-center mt-4">
                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-1">Search</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
