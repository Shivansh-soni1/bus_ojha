<!DOCTYPE html>
<html>
<head>
    <title>Login - Smart Travel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center" style="height: 100vh;">
    <div class="card p-4 shadow-lg" style="width: 400px;">
        <h3 class="text-center text-success mb-3">Welcome Back</h3>
        {% with messages = get_flashed_messages() %}
            {% if messages %}<div class="alert alert-warning">{{ messages[0] }}</div>{% endif %}
        {% endwith %}
        <form method="POST">
            <div class="mb-3"><label>Username</label><input type="text" name="username" class="form-control" required></div>
            <div class="mb-3"><label>Password</label><input type="password" name="password" class="form-control" required></div>
            <button type="submit" class="btn btn-success w-100">Login</button>
        </form>
        <div class="mt-3 text-center"><a href="/register">New User? Create Account</a></div>
    </div>
</body>
</html>
